# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help

on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    # Prevent concurrent deployments
    concurrency:
      group: pkgdown-${{ github.ref }}
      cancel-in-progress: true

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # Clean checkout (fixes worktree error)
      - uses: actions/checkout@v6
        with:
          clean: true
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website
          cache: true   # <--- caching enabled

      - name: Build site
        run: pkgdown::build_site_github_pages(
               new_process = FALSE,
               install = FALSE,
               dest_dir = "muiDataGrid"
             )
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: true
          branch: main
          folder: muiDataGrid
          repository-name: lgnbhl/lgnbhl.github.io
          target-folder: muiDataGrid
          token: ${{ secrets.DEPLOY_PAT }}
